name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build JAR
        run: ./gradlew bootJar -x test

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/dadoc-key.pem
          chmod 400 ~/.ssh/dadoc-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload JAR to EC2
        run: |
          scp -i ~/.ssh/dadoc-key.pem \
            build/libs/demo-api-0.0.1-SNAPSHOT.jar \
            ec2-user@${{ secrets.EC2_HOST }}:~/

      - name: Restart server
        run: |
          ssh -i ~/.ssh/dadoc-key.pem -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'SCRIPT'
            sudo systemctl restart damo
            sleep 10
            curl -sf http://localhost:8080/health || echo "Server starting..."
          SCRIPT
