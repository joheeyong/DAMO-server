server.port=8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

naver.search.client-id=${NAVER_SEARCH_CLIENT_ID:}
naver.search.client-secret=${NAVER_SEARCH_CLIENT_SECRET:}

youtube.api-key=${YOUTUBE_API_KEY:}

# JWT
jwt.secret=${JWT_SECRET:damo-app-2026-super-secret-key-for-jwt-token-signing-256bit}
jwt.expiration=86400000

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

# Naver OAuth2
naver.login.client-id=${NAVER_LOGIN_CLIENT_ID:}
naver.login.client-secret=${NAVER_LOGIN_CLIENT_SECRET:}
