server.port=8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

naver.search.client-id=${NAVER_SEARCH_CLIENT_ID:}
naver.search.client-secret=${NAVER_SEARCH_CLIENT_SECRET:}

youtube.api-key=${YOUTUBE_API_KEY:}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

# Naver OAuth2
naver.login.client-id=${NAVER_LOGIN_CLIENT_ID:}
naver.login.client-secret=${NAVER_LOGIN_CLIENT_SECRET:}

# Instagram Graph API
instagram.access-token=${INSTAGRAM_ACCESS_TOKEN:}
instagram.user-id=${INSTAGRAM_USER_ID:}

# Kakao (Daum) Search API
kakao.rest-api-key=${KAKAO_REST_API_KEY:}

# Kakao OAuth2
kakao.client-id=${KAKAO_REST_API_KEY:}
kakao.client-secret=${KAKAO_CLIENT_SECRET:}
